{% extends "base.html" %}

{% block title %}Add Visitor - MegaMart{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">
                        <i class="fas fa-user-plus"></i> Add New Visitor
                    </h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('submit_visitor') }}">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="gender" class="form-label">
                                    <i class="fas fa-venus-mars"></i> Gender
                                </label>
                                <select class="form-select" id="gender" name="gender" required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="age_group" class="form-label">
                                    <i class="fas fa-birthday-cake"></i> Age Group
                                </label>
                                <select class="form-select" id="age_group" name="age_group" required>
                                    <option value="">Select Age Group</option>
                                    <option value="Kid (0-12)">Kid (0-12)</option>
                                    <option value="Teenager (13-19)">Teenager (13-19)</option>
                                    <option value="Young Adult (20-35)">Young Adult (20-35)</option>
                                    <option value="Adult (36-55)">Adult (36-55)</option>
                                    <option value="Senior (56+)">Senior (56+)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="visit_date" class="form-label">
                                <i class="fas fa-calendar"></i> Visit Date
                            </label>
                            <input type="date" class="form-control" id="visit_date" name="visit_date" required>
                        </div>

                        <div class="mb-3">
                            <label for="comment" class="form-label">
                                <i class="fas fa-comment"></i> Comment
                            </label>
                            <textarea class="form-control" id="comment" name="comment" rows="3" placeholder="Enter any comment..."></textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('index') }}" class="btn btn-secondary me-md-2">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Save Visitor
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Set today's date
    document.getElementById('visit_date').valueAsDate = new Date();
</script>
{% endblock %}
