{% extends "base.html" %}

{% block title %}Welcome - MegaMart{% endblock %}

{% block content %}
<div class="index-background">
    <div class="container">
        <div class="row align-items-center justify-content-center">
            <!-- Left Column: Buttons -->
            <div class="col-lg-6 col-md-6 mb-5 mb-md-0 text-center">
                <div class="button-column">
                    <a href="{{ url_for('form') }}" class="square-btn shadow-lg">
                        <i class="fas fa-user-plus"></i>
                        <h4>Add Visitor</h4>
                    </a>
                    <a href="{{ url_for('dashboard') }}" class="square-btn outline shadow-lg">
                        <i class="fas fa-chart-line"></i>
                        <h4>Analytics</h4>
                    </a>
                </div>
            </div>

            <!-- Right Column: Image -->
            <div class="col-lg-6 col-md-6 text-center">
                <img src="{{ url_for('static', filename='shopping.png') }}" alt="Shopping Image" class="home-image">
            </div>
        </div>
    </div>
</div>
{% endblock %}
